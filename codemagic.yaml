workflows:
  ios-testflight:
    name: TYMEFLY iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: CodemagicScanbite

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.an2app.tymefly

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false