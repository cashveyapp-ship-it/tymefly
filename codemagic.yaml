workflows:
  ios-testflight:
    name: TYMEFLY iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.an2app.tymefly
        TEAM_ID: S396HHK846
        ASC_ISSUER_ID: c39b009b-44cf-4128-948e-2d4e375a5445
        ASC_KEY_ID: 7ZN5797WYL

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files $env:BUNDLE_ID `
            --create `
            --type IOS_APP_STORE `
            --platform IOS `
            --issuer-id $env:ASC_ISSUER_ID `
            --key-id $env:ASC_KEY_ID `
            --private-key "@env:AUTH_KEY"
        shell: powershell

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply signing to Xcode project
        script: xcode-project use-profiles

      - name: Create export options
        script: |
          cat > /tmp/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>S396HHK846</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>destination</key>
            <string>export</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        script: flutter build ipa --release --export-options-plist=/tmp/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive

    publishing:
      app_store_connect:
        issuer_id: $ASC_ISSUER_ID
        key_id: $ASC_KEY_ID
        private_key: $AUTH_KEY
        submit_to_testflight: true
        submit_to_app_store: false